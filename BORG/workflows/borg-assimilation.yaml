id: borg-assimilation
title: Borg Assimilation
description: Scan an existing project, generate project and module borg-cube specifications, review them, and stop without changing source code.
status: queued
entry_node: spec-assimilator
nodes:
  - id: spec-assimilator
    borg_name: Spec Assimilator
    role: assimilator
    agent: borg-spec-assimilator
    tasks:
      - id: project-scan
        title: Scan project and materialize borg-cube specs
        prompt: >-
          Goal: Generate missing borg-cube files for the project
          Scope: Analyze repository and derive required cube structure
          Constraints:
          - Do not modify source code or configuration
          - Mark all weak evidence as assumptions
          - Set materialize_borg_cube_files to true
        status: draft
  - id: requirement-node
    borg_name: Requirement Node
    role: reviewer
    agent: borg-requirement-node
    tasks:
      - id: spec-review
        title: Review assimilated borg-cube specs
        prompt: >-
          Goal: Review generated borg_cube_specs for structural quality
          Scope: Project and module specifications
          Constraints:
          - Ensure root borg-cube.md references all module specs correctly
          - No implementation leakage allowed
          - Return corrected borg_cube_specs if fixes are required
        status: draft
  - id: human-review-node
    borg_name: Human Review Phase
    role: reviewer
    agent: borg-requirement-node
    tasks:
      - id: human-review-handoff
        title: Compact User Review & Validation
        prompt: >-
          Goal: Produce Compact Review Output for user validation
          Scope: Reviewed specifications and Cube file preview
          Constraints:
          - Max 3 bullets for Summary
          - MANDATORY Cube Files Preview
          - Single Review Decision field (Label: Review Decision (Required))
          - Perform Adaptive Agent & Skill Adjustment after feedback
        status: draft
  - id: post-review-planner
    borg_name: Post-Review Planning Update
    role: planner
    agent: borg-requirement-node
    tasks:
      - id: update-plan-after-review
        title: Merge human review and update synthesis plan
        prompt: >-
          Goal: Merge authoritative human review into the execution plan
          Scope: borg_cube_specs, protected modules, and required cube files
          Constraints:
          - Treat human review as authoritative
          - Recompute required borg-cube.md outputs before synthesis
          - Ensure requested protected-module specs are included in the plan
        status: draft
  - id: cube-file-synthesizer
    borg_name: Cube File Synthesis Phase
    role: generator
    agent: borg-cube-generator
    tasks:
      - id: generate-cube-files
        title: Synthesize Cube-Borg and Cube-MD files
        prompt: >-
          Goal: Synthesize required Cube files (cube-*.json and cube-*.md)
          Scope: All identified agents, skills, and project structure
          Constraints:
          - Follow human review preview exactly
          - Machine-readable JSON, human-readable MD
          - Respect protected folders (e.g. /src/stm_cubemx/)
        status: draft
  - id: validation-node
    borg_name: Validation and Finalization Phase
    role: validator
    agent: borg-cube-testing-node
    tasks:
      - id: validate-generated-cube-files
        title: Validate synthesized cube outputs
        prompt: >-
          Goal: Validate post-review cube outputs before completion
          Scope: recomputed cube plan and synthesized cube files
          Constraints:
          - Confirm every required file from post-review planning is represented
          - Fail if requested protected-module specs are missing
          - Produce a compact validation summary for finalization
        status: draft
steps:
  - id: assimilation
    title: Scan existing project
    mode: sequential
    nodes:
      - spec-assimilator
  - id: spec-review
    title: Automated specification review
    mode: sequential
    nodes:
      - requirement-node
    retry:
      condition: nodes['requirement-node'].output.retry_required == true
      max_attempts: 2
      target_node: spec-assimilator
      message: 'Specification issues found. Regenerate the project and module borg_cube_specs based on this review: {{nodes[''requirement-node''].output.errors}}'
  - id: human-review
    title: Human-in-the-Loop Review
    mode: sequential
    nodes:
      - human-review-node
  - id: post-review-planning
    title: Post-Review Planning Update
    mode: sequential
    nodes:
      - post-review-planner
  - id: synthesis
    title: Cube File Synthesis
    mode: sequential
    nodes:
      - cube-file-synthesizer
  - id: validation
    title: Validation and Finalization
    mode: sequential
    nodes:
      - validation-node
